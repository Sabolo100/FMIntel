# Field mappings: extraction field -> Supabase column
# Note: schemas use 'title' and 'content' for validator.py compatibility,
# which are mapped here to the actual DB column names.

companies:
  field_mapping:
    title: "name"
    content: "description"
    name_aliases: "name_aliases"
    service_types: "service_types"
    website: "website"
    headquarters_city: "headquarters_city"
    headquarters_address: "headquarters_address"
    founded_year: "founded_year"
    employee_count_estimate: "employee_count_estimate"
    is_international: "is_international"
    status: "status"
    source_url: "source_urls"
    # key_people is NOT a DB column — persister extracts it to create person+job records
    key_people: "_key_people"
  auto_fields:
    created_at: "auto_timestamp"
    updated_at: "auto_timestamp"
    first_seen_at: "auto_timestamp"
    last_confirmed_at: "auto_timestamp"
  required_fields:
    - "name"
  defaults:
    status: "active"
    is_international: false
    service_types: []
    confidence: 0.5
  # After persisting a company, create person + job records for key_people
  related_entities:
    key_people:
      source_field: "_key_people"
      person_table: "people"
      jobs_table: "jobs"
      person_defaults:
        confidence: 0.4
      job_defaults:
        is_current: true
        confidence: 0.4

buildings:
  field_mapping:
    title: "name"
    content: "description"
    name_aliases: "name_aliases"
    building_type: "building_type"
    building_class: "building_class"
    status: "status"
    address: "address"
    city: "city"
    district: "district"
    zip_code: "zip_code"
    latitude: "latitude"
    longitude: "longitude"
    total_area_sqm: "total_area_sqm"
    leasable_area_sqm: "leasable_area_sqm"
    floors: "floors"
    year_built: "year_built"
    year_renovated: "year_renovated"
    source_url: "source_urls"
  auto_fields:
    created_at: "auto_timestamp"
    updated_at: "auto_timestamp"
    first_seen_at: "auto_timestamp"
    last_confirmed_at: "auto_timestamp"
  required_fields:
    - "name"
  defaults:
    building_type: "iroda"
    status: "mukodo"
    city: "Budapest"
    confidence: 0.5

people:
  field_mapping:
    title: "name"
    content: "bio"
    position_title: "title"
    linkedin_url: "linkedin_url"
    source_url: "source_urls"
    # current_company_name is NOT a DB column — persister resolves it to current_company_id
    current_company_name: "_resolve_company"
  auto_fields:
    created_at: "auto_timestamp"
    updated_at: "auto_timestamp"
    first_seen_at: "auto_timestamp"
    last_confirmed_at: "auto_timestamp"
  required_fields:
    - "name"
  defaults:
    confidence: 0.5
  resolve_fields:
    # After insert/update: resolve current_company_name -> current_company_id
    current_company_id:
      source_field: "_resolve_company"
      lookup_table: "companies"
      lookup_column: "name"
      create_if_missing: true
      create_defaults:
        service_types: []
        status: "active"
        confidence: 0.4
        is_international: false

news_mentions:
  field_mapping:
    title: "title"
    content: "summary"
    url: "url"
    source_domain: "source_domain"
    published_at: "published_at"
    entity_type: "entity_type"
    entity_name: "entity_name"
    sentiment: "sentiment"
  auto_fields:
    created_at: "auto_timestamp"
  required_fields:
    - "title"
    - "url"
    - "entity_type"
    - "entity_name"
  defaults:
    sentiment: "neutral"
    confidence: 0.5
