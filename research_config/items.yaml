# Research Item Definitions for Onjaro Bike Web
# Each item defines a research target: what to search, how to extract, where to store.

research_items:
  - id: "cycling_articles_hu"
    name: "Magyar kerekparos cikkek"
    enabled: true
    priority: 1
    target_table: "articles"
    search_type: "topic_search"
    schema_name: "article"
    schedule: "daily"
    max_results_per_run: 5
    topics:
      - "45 ev feletti kerekparozas edzesterv"
      - "orszaguti kerekpar felszereles 2026"
      - "MTB tippek kozepkoruaknak"
      - "kerekparos regeneracio 45 felett"
      - "kerekpar taplalkozas idos sportoloknak"
    language: "hu"
    content_types:
      - "cikk"
    min_confidence: 0.6
    auto_approve_above: 0.8
    manual_review_below: 0.4

  - id: "training_plans"
    name: "Edzestervek kutatasa"
    enabled: true
    priority: 2
    target_table: "articles"
    search_type: "topic_search"
    schema_name: "article"
    schedule: "daily"
    max_results_per_run: 3
    topics:
      - "kerekparos edzesterv 45-60 eves korosztaly"
      - "MTB edzesterv kezdoknek kozepkoruaknak"
      - "orszaguti kerekpar edzesterv haladoknak"
      - "ciklokrossz felkeszules edzesterv"
    language: "hu"
    content_types:
      - "edzesterv"
    min_confidence: 0.7
    auto_approve_above: 0.85
    manual_review_below: 0.5

  - id: "gear_reviews"
    name: "Felszereles tesztek es ajanlok"
    enabled: true
    priority: 3
    target_table: "articles"
    search_type: "topic_search"
    schema_name: "article"
    schedule: "daily"
    max_results_per_run: 3
    topics:
      - "kerekpar felszereles teszt 2026"
      - "orszaguti kerekpar osszehasonlitas"
      - "MTB felszereles ajanlo"
      - "kerekparos ruha kiegeszitok kozepkoruaknak"
    language: "hu"
    content_types:
      - "felszereles"
    min_confidence: 0.6
    auto_approve_above: 0.8
    manual_review_below: 0.4
